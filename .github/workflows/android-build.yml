name: Build Android

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Opt into Node.js 24 for JavaScript-based actions: GitHub is deprecating Node 20
# (forced default on 2026-06-16) which has been observed to break `npx`/Capacitor flows.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_OPTIONS: '--max-old-space-size=4096'

permissions:
  contents: read

jobs:
  build:
    name: Build APK (Capacitor)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install npm dependencies
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund 2>/dev/null || npm install --no-audit --no-fund
          # Re-apply the executable bit; the cache restore from setup-node@v4
          # can preserve symlinks whose target lost the bit.
          chmod +x node_modules/.bin/cap 2>/dev/null || true
          echo "--- node_modules/.bin/cap ---"
          ls -la node_modules/.bin/cap
          echo "--- cap version ---"
          node_modules/.bin/cap --version

      - name: Build Next.js (static export → out/)
        run: |
          set -euo pipefail
          npm run build
          echo "--- out/ top level ---"
          ls -la out/ | head -20
          test -f out/index.html || { echo "::error::out/index.html missing after build"; exit 1; }

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Sync Capacitor (full)
        id: cap_sync
        run: |
          set -euo pipefail
          node_modules/.bin/cap sync android --verbose

      - name: "Fallback: cap copy android"
        if: failure() && steps.cap_sync.conclusion == 'failure'
        run: |
          set -euo pipefail
          echo "::warning::cap sync failed; falling back to cap copy (web assets only)"
          node_modules/.bin/cap copy android --verbose

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build release APK (unsigned)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        continue-on-error: true

      - name: Locate APK artifacts
        working-directory: android
        id: collect_apk
        run: |
          set -e
          mkdir -p ../apk-output
          find app/build/outputs/apk -name '*.apk' -print -exec cp {} ../apk-output/ \; || true
          ls -la ../apk-output
          echo "apk_count=$(ls -1 ../apk-output 2>/dev/null | wc -l)" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifacts
        if: steps.collect_apk.outputs.apk_count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: bawmusic-apk
          path: apk-output/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bawmusic-build-logs
          path: |
            android/app/build/outputs/logs
            android/app/build/reports
          if-no-files-found: ignore
          retention-days: 7
