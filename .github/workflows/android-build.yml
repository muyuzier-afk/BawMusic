name: Build Android

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build APK (Capacitor)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci || npm install

      - name: Build Next.js (static export → out/)
        run: npm run build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build release APK (unsigned)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        continue-on-error: true

      - name: Locate APK artifacts
        working-directory: android
        id: collect_apk
        run: |
          set -e
          mkdir -p ../apk-output
          find app/build/outputs/apk -name '*.apk' -print -exec cp {} ../apk-output/ \; || true
          ls -la ../apk-output
          echo "apk_count=$(ls -1 ../apk-output 2>/dev/null | wc -l)" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifacts
        if: steps.collect_apk.outputs.apk_count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: bawmusic-apk
          path: apk-output/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload debug mapping
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bawmusic-build-logs
          path: |
            android/app/build/outputs/logs
            android/app/build/reports
          if-no-files-found: ignore
          retention-days: 7
